name: Secret and Credential Scan

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets
        run: |
          FAILED=0
          PATTERNS=(
            "password\s*="
            "passwd\s*="
            "db_password"
            "ANTHROPIC_API_KEY\s*="
            "SECRET_KEY\s*="
            "-----BEGIN.*PRIVATE KEY-----"
          )
          for pattern in "${PATTERNS[@]}"; do
            # Exclude lines that use environment variable lookups — those are
            # the correct secure pattern and must not be flagged as violations.
            HITS=$(grep -rn --include="*.py" --include="*.sh" \
                   --include="*.conf" --include="*.json" --include="*.env" \
                   -i "$pattern" . \
                   --exclude-dir=".git" \
                   --exclude-dir="backups" 2>/dev/null \
                   | grep -v "os\.environ\|os\.getenv\|environ\.get\|getenv\b" \
                   || true)
            if [ -n "$HITS" ]; then
              echo "SECURITY VIOLATION — pattern '$pattern' found:"
              echo "$HITS"
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then
            echo ""
            echo "Security scan FAILED. Remove credentials before merging."
            exit 1
          fi
          echo "Security scan PASSED."
