name: Secret and Credential Scan

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets
        run: |
          FAILED=0
          PATTERNS=(
            "password\s*="
            "passwd\s*="
            "db_password"
            "ANTHROPIC_API_KEY\s*="
            "SECRET_KEY\s*="
            "-----BEGIN.*PRIVATE KEY-----"
          )
          for pattern in "${PATTERNS[@]}"; do
            # Narrow carve-out: exclude lines that contain an explicit test-fixture
            # marker value (test_password, dummy_password). These are not real
            # credentials — they are intentional placeholders in test scripts.
            # Any other value (admin, secret, 123456, etc.) still fails the scan.
            HITS=$(grep -rn --include="*.py" --include="*.sh" \
                   --include="*.conf" --include="*.json" --include="*.env" \
                   -i "$pattern" . \
                   --exclude-dir=".git" \
                   --exclude-dir="backups" \
                   --exclude="local_secret_scan.sh" 2>/dev/null \
                   | grep -v "'test_password'\|'dummy_password'" \
                   || true)
            if [ -n "$HITS" ]; then
              echo "SECURITY VIOLATION — pattern '$pattern' found:"
              echo "$HITS"
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then
            echo ""
            echo "Security scan FAILED. Remove credentials before merging."
            exit 1
          fi
          echo "Security scan PASSED."
